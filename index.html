<!DOCTYPE html>
<html lang="pt-BR" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Forecast · Poli Digital</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://cdn.jsdelivr.net" crossorigin>
<link rel="preconnect" href="https://cdnjs.cloudflare.com" crossorigin>
<link rel="dns-prefetch" href="https://cbdxscsgcprmhtbqjcyn.supabase.co">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;600&family=JetBrains+Mono:wght@400&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css" media="print" onload="this.media='all'">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js/dist/umd/supabase.js"></script>
<style>:root{
  --bg:#07070F;--bg-card:#0D0D1A;--bg-surf:#131326;--bg-in:#0A0A18;
  --bd:rgba(255,255,255,0.06);--bd-a:rgba(30,90,255,0.4);
  --ac:#1E5AFF;--ac-s:#6B9FFF;--ac-d:rgba(30,90,255,0.12);
  --txt:#F2F2FA;--txt2:#8888A8;--txt3:#52526A;
  --hugo:#22C55E;--h-d:rgba(34,197,94,0.10);
  --calil:#F97316;--c-d:rgba(249,115,22,0.10);
  --won:#22C55E;--won-d:rgba(34,197,94,0.10);
  --lost:#F87171;--lost-d:rgba(248,113,113,0.10);
  --red:#F87171;--r-d:rgba(248,113,113,0.10);
  --amb:#FCD34D;--a-d:rgba(252,211,77,0.10);
  --blu:#93C5FD;--b-d:rgba(147,197,253,0.10);
  --gold:#FFD700;--silver:#B0B8C8;--bronze:#CD7F32;
  --rr:10px;--rs:6px;
}
[data-theme="light"]{
  --bg:#F0F0F8;--bg-card:#FFFFFF;--bg-surf:#E8E8F4;--bg-in:#F4F4FC;
  --bd:rgba(0,0,0,0.08);--bd-a:rgba(30,90,255,0.3);
  --txt:#08080F;--txt2:#3A3A5C;--txt3:#7070A0;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Sora',system-ui,sans-serif;background:var(--bg);color:var(--txt);min-height:100vh;transition:background .2s,color .2s;}
.app{max-width:1120px;margin:0 auto;padding:22px 24px 80px;}
.topbar{display:flex;align-items:center;justify-content:space-between;margin-bottom:20px;gap:12px;flex-wrap:wrap;}
.brand{display:flex;align-items:center;gap:12px;}
.logo-img{height:30px;width:auto;}
.brand-sep{width:1px;height:26px;background:var(--bd);flex-shrink:0;}
.brand-sub{font-size:11px;color:var(--txt2);}
.top-right{display:flex;align-items:center;gap:7px;}
.chip{font-size:11px;color:var(--txt2);background:var(--bg-card);border:1px solid var(--bd);border-radius:20px;padding:4px 11px;display:flex;align-items:center;gap:5px;}
.save-chip{font-size:11px;color:var(--won);background:var(--won-d);border:1px solid rgba(34,197,94,.2);border-radius:20px;padding:4px 11px;display:flex;align-items:center;gap:4px;transition:opacity .4s;}
.save-chip.hidden{opacity:0;pointer-events:none;}
.icon-btn{width:32px;height:32px;background:var(--bg-card);border:1px solid var(--bd);border-radius:var(--rs);color:var(--txt2);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:15px;transition:all .15s;}
.icon-btn:hover{border-color:var(--bd-a);color:var(--ac-s);}
/* METRICS */
.metrics{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:12px;}
.metric{background:var(--bg-card);border:1px solid var(--bd);border-radius:var(--rr);padding:14px 16px;position:relative;overflow:hidden;}
.metric::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;}
.metric.m-total::before{background:var(--ac);}
.metric.m-won::before{background:var(--won);}
.metric.m-hugo::before{background:var(--hugo);}
.metric.m-calil::before{background:var(--calil);}
.m-head{display:flex;align-items:center;margin-bottom:6px;}
.m-label{font-size:9px;font-weight:600;color:var(--txt3);text-transform:uppercase;letter-spacing:.08em;}
.m-badge{font-size:9px;font-weight:700;padding:1px 6px;border-radius:10px;margin-left:auto;}
.m-badge.b-won{background:var(--won-d);color:var(--won);}
.m-badge.b-ac{background:var(--ac-d);color:var(--ac-s);}
.m-val{font-size:19px;font-weight:700;line-height:1;margin-bottom:3px;font-variant-numeric:tabular-nums;}
.metric.m-total .m-val{color:var(--ac-s);}
.metric.m-won .m-val{color:var(--won);}
.metric.m-hugo .m-val{color:var(--hugo);}
.metric.m-calil .m-val{color:var(--calil);}
.m-sub{font-size:10px;color:var(--txt3);}
/* META */
.meta-section{background:var(--bg-card);border:1px solid var(--bd);border-radius:var(--rr);padding:14px 18px;margin-bottom:14px;}
.meta-header{display:flex;align-items:center;gap:8px;margin-bottom:12px;}
.meta-title{font-size:10px;font-weight:700;color:var(--txt3);text-transform:uppercase;letter-spacing:.08em;}
.meta-edit-btn{width:24px;height:24px;background:none;border:1px solid var(--bd);border-radius:5px;color:var(--txt3);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:11px;margin-left:auto;}
.meta-edit-btn:hover{border-color:var(--bd-a);color:var(--ac-s);}
.meta-bars{display:grid;grid-template-columns:1fr 1fr 1fr;gap:14px;}
.meta-bar-item{display:flex;flex-direction:column;gap:5px;}
.meta-bar-label{display:flex;justify-content:space-between;align-items:baseline;}
.meta-bar-name{font-size:10px;font-weight:600;color:var(--txt2);}
.meta-bar-vals{font-size:10px;color:var(--txt3);font-family:'JetBrains Mono',monospace;}
.meta-bar-pct{font-size:11px;font-weight:700;}
.meta-track{height:5px;background:rgba(255,255,255,0.06);border-radius:3px;overflow:hidden;}
[data-theme="light"] .meta-track{background:rgba(0,0,0,0.08);}
.meta-fill{height:5px;border-radius:3px;transition:width .6s ease;}
.meta-edit-form{display:grid;grid-template-columns:1fr 1fr auto;gap:10px;align-items:end;}
.meta-edit-form label{font-size:10px;color:var(--txt2);margin-bottom:3px;display:block;}
/* DATE NAV */
.date-nav{display:flex;align-items:center;gap:7px;margin-bottom:14px;flex-wrap:wrap;}
.nav-btn{width:28px;height:28px;background:var(--bg-card);border:1px solid var(--bd);border-radius:var(--rs);color:var(--txt2);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:13px;transition:all .15s;}
.nav-btn:hover{border-color:var(--bd-a);color:var(--ac-s);}
.date-display{font-size:12px;font-weight:600;color:var(--txt);min-width:168px;text-align:center;background:var(--bg-card);border:1px solid var(--bd);border-radius:var(--rs);padding:4px 12px;font-family:'JetBrains Mono',monospace;}
.date-jump{height:28px;font-size:11px;padding:0 8px;background:var(--bg-in);border:1px solid var(--bd);border-radius:var(--rs);color:var(--txt2);outline:none;font-family:'Sora',sans-serif;}
.date-jump:focus{border-color:var(--ac);}
.today-btn{font-size:11px;font-weight:500;padding:4px 11px;background:var(--ac-d);border:1px solid rgba(30,90,255,.3);border-radius:20px;color:var(--ac-s);cursor:pointer;transition:all .15s;}
.today-btn:hover{background:var(--ac);color:#fff;}
.hist-badge{font-size:10px;color:var(--amb);background:var(--a-d);border:1px solid rgba(252,211,77,.2);border-radius:20px;padding:3px 9px;display:flex;align-items:center;gap:3px;}
/* TOOLBAR */
.toolbar{display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:8px;margin-bottom:14px;}
.tabs{display:flex;gap:2px;background:var(--bg-card);border:1px solid var(--bd);border-radius:var(--rr);padding:3px;}
.tab{font-size:11px;font-weight:500;padding:5px 13px;border-radius:7px;border:none;background:none;color:var(--txt2);cursor:pointer;font-family:'Sora',sans-serif;display:flex;align-items:center;gap:5px;transition:all .15s;}
.tab i{font-size:13px;}
.tab:hover{color:var(--txt);}
.tab.active{background:var(--ac);color:#fff;}
.filter-bar{display:flex;align-items:center;gap:5px;flex-wrap:wrap;}
.fl{font-size:10px;color:var(--txt3);margin-right:2px;}
.fb{font-size:10px;font-weight:600;padding:4px 10px;border-radius:20px;border:1px solid var(--bd);background:var(--bg-card);color:var(--txt2);cursor:pointer;font-family:'Sora',sans-serif;transition:all .12s;display:flex;align-items:center;gap:3px;}
.fb.fa{background:var(--ac-d);color:var(--ac-s);border-color:var(--bd-a);}
.fb.fq{background:var(--r-d);color:var(--red);border-color:rgba(248,113,113,.3);}
.fb.fm{background:var(--a-d);color:var(--amb);border-color:rgba(252,211,77,.3);}
.fb.ff{background:var(--b-d);color:var(--blu);border-color:rgba(147,197,253,.3);}
/* SORT BAR */
.sort-bar{display:flex;align-items:center;gap:5px;margin-bottom:14px;flex-wrap:wrap;}
.sort-label{font-size:10px;color:var(--txt3);margin-right:2px;}
.sort-btn{font-size:11px;font-weight:500;padding:4px 12px;border-radius:20px;border:1px solid var(--bd);background:var(--bg-card);color:var(--txt2);cursor:pointer;font-family:'Sora',sans-serif;transition:all .12s;}
.sort-btn.active{background:var(--ac-d);color:var(--ac-s);border-color:rgba(30,90,255,.3);}
/* SQUADS */
.squads{display:grid;grid-template-columns:1fr 1fr;gap:14px;}
.squad{background:var(--bg-card);border:1px solid var(--bd);border-radius:var(--rr);overflow:hidden;}
.sq-head{display:flex;align-items:center;gap:7px;padding:11px 14px;border-bottom:1px solid var(--bd);}
.sq-badge{font-size:9px;font-weight:700;padding:2px 7px;border-radius:4px;text-transform:uppercase;letter-spacing:.05em;}
.squad-hugo  .sq-badge{background:var(--h-d);color:var(--hugo);}
.squad-calil .sq-badge{background:var(--c-d);color:var(--calil);}
.sq-name{font-size:13px;font-weight:500;}
.sq-opp{font-size:10px;color:var(--txt3);}
.sq-total{margin-left:auto;font-size:13px;font-weight:700;font-family:'JetBrains Mono',monospace;}
.squad-hugo  .sq-total{color:var(--hugo);}
.squad-calil .sq-total{color:var(--calil);}
.tbl-h{display:grid;grid-template-columns:14px 18px 2fr 1fr 1fr 68px 76px;gap:5px;padding:4px 10px;border-bottom:1px solid var(--bd);align-items:center;}
.tbl-h span{font-size:8px;font-weight:700;color:var(--txt3);text-transform:uppercase;letter-spacing:.07em;}
/* ENTRY */
.entry-wrap{border-bottom:1px solid var(--bd);}
.entry-wrap:last-child{border-bottom:none;}
.entry-wrap.drag-over .entry{background:rgba(30,90,255,0.08);border-top:2px solid var(--ac);}
.entry-wrap.drag-ghost{opacity:0.4;}
.entry{display:grid;grid-template-columns:14px 18px 2fr 1fr 1fr 68px 76px;gap:5px;align-items:center;padding:7px 10px;transition:background .1s;user-select:none;}
.entry:hover{background:rgba(255,255,255,0.02);}
.entry.sel{background:rgba(30,90,255,0.06);}
.entry.e-won{background:rgba(34,197,94,0.04);}
.entry.e-lost{background:rgba(248,113,113,0.04);}
.drag-handle{cursor:grab;color:var(--txt3);font-size:13px;display:flex;align-items:center;justify-content:center;opacity:0.4;transition:opacity .15s;}
.entry:hover .drag-handle{opacity:1;}
.drag-handle:active{cursor:grabbing;}
.cb-w{display:flex;align-items:center;justify-content:center;}
input[type=checkbox]{width:13px;height:13px;cursor:pointer;accent-color:var(--ac);}
.e-co{font-size:11px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:100%;}
.e-co a{color:var(--ac-s);margin-left:4px;font-size:10px;text-decoration:none;opacity:0;transition:opacity .15s;}
.entry:hover .e-co a{opacity:1;}
.e-cl{font-size:9px;color:var(--txt2);margin-top:1px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.e-mrr{font-size:11px;font-weight:600;font-family:'JetBrains Mono',monospace;}
.e-d{font-size:9px;color:var(--txt2);font-family:'JetBrains Mono',monospace;}
.tmp{font-size:8px;font-weight:700;padding:2px 5px;border-radius:20px;display:inline-block;margin-top:2px;letter-spacing:.04em;text-transform:uppercase;}
.tq{background:var(--r-d);color:var(--red);}
.tm{background:var(--a-d);color:var(--amb);}
.tf{background:var(--b-d);color:var(--blu);}
.status-btns{display:flex;gap:3px;align-items:center;justify-content:flex-end;}
.st-btn{width:26px;height:20px;border:1px solid var(--bd);border-radius:5px;background:none;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:10px;color:var(--txt3);transition:all .12s;}
.st-btn.won-on{background:var(--won-d);border-color:rgba(34,197,94,.3);color:var(--won);}
.st-btn.lost-on{background:var(--lost-d);border-color:rgba(248,113,113,.3);color:var(--lost);}
.entry-actions{display:flex;gap:2px;align-items:center;justify-content:flex-end;}
.act-btn{width:22px;height:22px;background:none;border:none;cursor:pointer;color:var(--txt3);font-size:11px;border-radius:4px;display:flex;align-items:center;justify-content:center;transition:all .1s;opacity:0;}
.entry:hover .act-btn{opacity:1;}
.act-btn:hover{background:var(--bg-surf);color:var(--txt);}
.act-btn.has-notes{opacity:0.7;color:var(--ac-s);}
.act-btn.del-b:hover{color:var(--red);background:var(--r-d);}
/* NOTES ROW */
.notes-row{display:none;padding:4px 10px 8px 52px;}
.notes-row.open{display:flex;align-items:flex-start;gap:8px;}
.notes-label{font-size:10px;color:var(--txt3);white-space:nowrap;margin-top:5px;}
.notes-ta{flex:1;min-height:48px;font-size:11px;padding:5px 8px;background:var(--bg-in);border:1px solid var(--bd);border-radius:var(--rs);color:var(--txt);resize:none;outline:none;font-family:'Sora',sans-serif;}
.notes-ta:focus{border-color:var(--ac);}
.notes-save{height:26px;padding:0 10px;background:var(--ac-d);border:1px solid rgba(30,90,255,.3);border-radius:var(--rs);color:var(--ac-s);font-size:10px;font-weight:600;cursor:pointer;font-family:'Sora',sans-serif;white-space:nowrap;}
.notes-save:hover{background:var(--ac);color:#fff;}
/* EDIT ROW */
.edit-entry{padding:10px 12px;background:rgba(30,90,255,0.05);border-left:2px solid var(--ac);}
.edit-r1{display:grid;grid-template-columns:1fr 1fr;gap:6px;margin-bottom:6px;}
.edit-r2{display:grid;grid-template-columns:1fr 1fr 1fr;gap:6px;margin-bottom:6px;}
.edit-r3{display:grid;grid-template-columns:1fr auto;gap:6px;}
.edit-actions-row{display:flex;gap:6px;margin-top:6px;}
.save-edit-btn{flex:1;height:28px;background:var(--ac);border:none;border-radius:var(--rs);color:#fff;font-size:11px;font-weight:600;cursor:pointer;font-family:'Sora',sans-serif;display:flex;align-items:center;justify-content:center;gap:4px;}
.cancel-edit-btn{height:28px;padding:0 12px;background:none;border:1px solid var(--bd);border-radius:var(--rs);color:var(--txt3);font-size:11px;cursor:pointer;font-family:'Sora',sans-serif;}
/* EMPTY */
.empty-s{display:flex;flex-direction:column;align-items:center;padding:22px;gap:5px;color:var(--txt3);font-size:11px;}
.empty-s i{font-size:18px;}
/* ADD FORM */
.add-f{border-top:1px solid var(--bd);padding:10px 14px;background:var(--bg-surf);}
.ft{font-size:8px;font-weight:700;color:var(--txt3);text-transform:uppercase;letter-spacing:.08em;margin-bottom:7px;}
.fr2{display:grid;grid-template-columns:1fr 1fr;gap:5px;margin-bottom:5px;}
.fr3{display:grid;grid-template-columns:1.5fr 1fr 1fr;gap:5px;margin-bottom:5px;}
.fi{width:100%;height:27px;font-size:11px;padding:0 8px;background:var(--bg-in);border:1px solid var(--bd);border-radius:var(--rs);color:var(--txt);outline:none;font-family:'Sora',sans-serif;transition:border-color .15s;}
.fi::placeholder{color:var(--txt3);}
.fi:focus{border-color:var(--ac);}
select.fi{cursor:pointer;background:var(--bg-in);color:var(--txt);}
select.fi option{background:var(--bg-surf);color:var(--txt);}
[data-theme="light"] select.fi{background:#F4F4FC;color:#08080F;}
[data-theme="light"] select.fi option{background:#FFFFFF;color:#08080F;}
.add-b{width:100%;height:27px;background:var(--ac-d);border:1px solid rgba(30,90,255,.3);border-radius:var(--rs);color:var(--ac-s);font-size:11px;font-weight:600;cursor:pointer;font-family:'Sora',sans-serif;display:flex;align-items:center;justify-content:center;gap:4px;transition:all .15s;margin-top:5px;}
.add-b:hover{background:var(--ac);color:#fff;border-color:var(--ac);}
/* CARRY */
.carry-bar{margin-top:14px;background:var(--bg-card);border:1px solid var(--bd-a);border-radius:var(--rr);padding:12px 16px;display:flex;align-items:center;gap:10px;flex-wrap:wrap;}
.carry-bar.hidden{display:none;}
.carry-info{font-size:12px;font-weight:500;color:var(--ac-s);display:flex;align-items:center;gap:5px;}
.carry-count{background:var(--ac);color:#fff;font-size:9px;font-weight:700;padding:2px 6px;border-radius:20px;}
.carry-dt{height:30px;font-size:11px;padding:0 9px;background:var(--bg-in);border:1px solid var(--bd-a);border-radius:var(--rs);color:var(--txt);outline:none;font-family:'JetBrains Mono',monospace;}
.carry-ok{height:30px;padding:0 14px;background:var(--ac);border:none;border-radius:var(--rs);color:#fff;font-size:11px;font-weight:600;cursor:pointer;font-family:'Sora',sans-serif;display:flex;align-items:center;gap:4px;}
.carry-x{height:30px;padding:0 10px;background:none;border:1px solid var(--bd);border-radius:var(--rs);color:var(--txt3);font-size:11px;cursor:pointer;font-family:'Sora',sans-serif;}
.carry-ml{margin-left:auto;}
/* CLOSER */
.closer-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px;}
.closer-block{background:var(--bg-card);border:1px solid var(--bd);border-radius:var(--rr);overflow:hidden;}
.cr{display:grid;grid-template-columns:1fr 52px 36px auto;gap:8px;align-items:center;padding:9px 14px;border-bottom:1px solid var(--bd);}
.cr:last-child{border-bottom:none;}
.cr:hover{background:rgba(255,255,255,0.02);}
.cn{font-size:11px;font-weight:500;}
.cpills{display:flex;gap:2px;margin-top:2px;}
.cpill{font-size:8px;font-weight:700;padding:1px 4px;border-radius:8px;}
.c-bar-w{height:3px;background:rgba(255,255,255,0.07);border-radius:2px;overflow:hidden;}
[data-theme="light"] .c-bar-w{background:rgba(0,0,0,0.08);}
.c-bar{height:3px;border-radius:2px;transition:width .4s;}
.squad-hugo  .c-bar{background:var(--hugo);}
.squad-calil .c-bar{background:var(--calil);}
.c-opp{font-size:9px;color:var(--txt3);text-align:right;}
.c-mrr{font-size:11px;font-weight:700;font-family:'JetBrains Mono',monospace;text-align:right;min-width:72px;}
.czero{color:var(--txt3);}
/* RANKING */
.ranking-wrap{display:flex;flex-direction:column;gap:16px;}
.rank-period-bar{display:flex;align-items:center;gap:5px;flex-wrap:wrap;margin-bottom:4px;}
.ranking-grid{display:grid;grid-template-columns:1fr 1fr;gap:16px;}
.rank-block{background:var(--bg-card);border:1px solid var(--bd);border-radius:var(--rr);overflow:hidden;}
.rank-podium{display:flex;align-items:flex-end;justify-content:center;gap:8px;padding:20px 16px 0;}
.podium-slot{display:flex;flex-direction:column;align-items:center;gap:6px;flex:1;max-width:110px;}
.podium-avatar{width:40px;height:40px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;flex-shrink:0;}
.p1 .podium-avatar{width:48px;height:48px;font-size:14px;border:2px solid var(--gold);}
.p2 .podium-avatar{border:2px solid var(--silver);}
.p3 .podium-avatar{border:2px solid var(--bronze);}
.squad-hugo  .podium-avatar{background:var(--h-d);color:var(--hugo);}
.squad-calil .podium-avatar{background:var(--c-d);color:var(--calil);}
.podium-name{font-size:10px;font-weight:600;text-align:center;line-height:1.2;}
.podium-mrr{font-size:11px;font-weight:700;font-family:'JetBrains Mono',monospace;text-align:center;}
.podium-stand{width:100%;border-radius:4px 4px 0 0;display:flex;align-items:center;justify-content:center;}
.p1 .podium-stand{height:56px;background:rgba(255,215,0,0.15);border-top:2px solid rgba(255,215,0,0.4);}
.p2 .podium-stand{height:40px;background:rgba(176,184,200,0.12);border-top:2px solid rgba(176,184,200,0.3);}
.p3 .podium-stand{height:28px;background:rgba(205,127,50,0.12);border-top:2px solid rgba(205,127,50,0.3);}
.rank-list{padding:6px 0;}
.rank-row{display:grid;grid-template-columns:28px 1fr auto auto;gap:8px;align-items:center;padding:7px 14px;border-top:1px solid var(--bd);}
.rank-pos{font-size:10px;font-weight:700;color:var(--txt3);text-align:center;width:20px;height:20px;border-radius:50%;display:flex;align-items:center;justify-content:center;background:var(--bg-surf);}
.rank-name{font-size:11px;font-weight:500;}
.rank-pipe{font-size:10px;color:var(--txt3);}
.rank-mrr{font-size:11px;font-weight:700;font-family:'JetBrains Mono',monospace;color:var(--won);}
.rank-mrr.zero{color:var(--txt3);}
.rank-empty{padding:16px;text-align:center;font-size:11px;color:var(--txt3);}
/* REPORTS */
.rpt-wrap{display:flex;flex-direction:column;gap:16px;}
.period-bar{display:flex;gap:4px;flex-wrap:wrap;}
.per-btn{font-size:11px;font-weight:500;padding:5px 13px;border-radius:20px;border:1px solid var(--bd);background:var(--bg-card);color:var(--txt2);cursor:pointer;font-family:'Sora',sans-serif;transition:all .12s;}
.per-btn.active{background:var(--ac);color:#fff;border-color:var(--ac);}
.custom-range{display:flex;align-items:center;gap:8px;margin-top:8px;}
.custom-range label{font-size:11px;color:var(--txt2);}
.rpt-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:14px;}
.rpt-card{background:var(--bg-card);border:1px solid var(--bd);border-radius:var(--rr);padding:16px;}
.rpt-card.full{grid-column:1/-1;}
.rpt-title{font-size:10px;font-weight:700;color:var(--txt3);text-transform:uppercase;letter-spacing:.07em;margin-bottom:14px;display:flex;align-items:center;gap:5px;}
.rpt-title i{font-size:13px;}
.chart-wrap{position:relative;height:180px;}
.chart-wrap.tall{height:220px;}
.chart-wrap.xtall{height:260px;}
.stat-row{display:flex;gap:20px;flex-wrap:wrap;}
.stat-item{display:flex;flex-direction:column;gap:3px;}
.stat-val{font-size:22px;font-weight:700;}
.stat-lbl{font-size:9px;color:var(--txt3);text-transform:uppercase;letter-spacing:.06em;font-weight:600;}
.rpt-table{width:100%;border-collapse:collapse;font-size:11px;}
.rpt-table th{font-size:9px;font-weight:700;color:var(--txt3);text-transform:uppercase;letter-spacing:.06em;padding:5px 10px;text-align:left;border-bottom:1px solid var(--bd);}
.rpt-table td{padding:7px 10px;border-bottom:1px solid var(--bd);color:var(--txt);}
.rpt-table tr:last-child td{border-bottom:none;}
.rpt-table tr:hover td{background:rgba(255,255,255,0.02);}
.rpt-table .num{text-align:right;font-family:'JetBrains Mono',monospace;font-weight:600;}
.rpt-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0;display:inline-block;margin-right:6px;}
.conv{font-size:10px;font-weight:700;padding:2px 6px;border-radius:10px;background:var(--won-d);color:var(--won);}
@media(max-width:680px){.squads,.closer-grid,.metrics,.rpt-grid,.ranking-grid{grid-template-columns:1fr;}.meta-bars{grid-template-columns:1fr;}.app{padding:14px 12px 60px;}.rpt-card.full{grid-column:auto;}}

.login-page{min-height:100vh;display:flex;align-items:center;justify-content:center;background:var(--bg);position:relative;}
.login-card{background:var(--bg-card);border:1px solid var(--bd);border-radius:16px;padding:40px 36px;width:100%;max-width:400px;display:flex;flex-direction:column;gap:12px;}
.login-logo{height:32px;width:auto;margin-bottom:8px;}
.login-title{font-size:18px;font-weight:600;color:var(--txt);}
.login-sub{font-size:12px;color:var(--txt2);margin-bottom:4px;}
.login-input{height:40px!important;font-size:13px!important;}
.login-btn-primary{width:100%;height:40px;background:var(--ac);border:none;border-radius:var(--rs);color:#fff;font-size:13px;font-weight:600;cursor:pointer;font-family:'Sora',sans-serif;display:flex;align-items:center;justify-content:center;gap:7px;transition:all .15s;}
.login-btn-primary:hover{background:#1449CC;}
.login-btn-primary:disabled{opacity:0.6;cursor:not-allowed;}
.login-btn-google{width:100%;height:40px;background:var(--bg-surf);border:1px solid var(--bd);border-radius:var(--rs);color:var(--txt);font-size:13px;font-weight:500;cursor:pointer;font-family:'Sora',sans-serif;display:flex;align-items:center;justify-content:center;gap:8px;transition:all .15s;}
.login-btn-google:hover{border-color:var(--bd-a);}
.login-btn-secondary{width:100%;height:36px;background:none;border:1px solid var(--bd);border-radius:var(--rs);color:var(--txt2);font-size:12px;cursor:pointer;font-family:'Sora',sans-serif;transition:all .15s;}
.login-btn-secondary:hover{border-color:var(--bd-a);color:var(--txt);}
.login-divider{display:flex;align-items:center;gap:10px;margin:4px 0;}
.login-divider::before,.login-divider::after{content:'';flex:1;height:1px;background:var(--bd);}
.login-divider span{font-size:11px;color:var(--txt3);}
.login-error{font-size:11px;color:var(--lost);background:var(--lost-d);border:1px solid rgba(248,113,113,.2);border-radius:var(--rs);padding:8px 10px;text-align:center;}
.user-chip{max-width:120px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
</style>

  const y=new Date();y.setDate(y.getDate()-1);const yS=y.toISOString().split('T')[0];
  const tm=new Date();tm.setDate(tm.getDate()+1);const tS=tm.toISOString().split('T')[0];
  const f=d.toLocaleDateString('pt-BR',{weekday:'short',day:'2-digit',month:'short'});
  if(ds===t)return'Hoje · '+f;if(ds===yS)return'Ontem · '+f;if(ds===tS)return'Amanhã · '+f;return f;
}
function getPeriodRange(p,s,e){
  const t=todayStr(),now=new Date();
  if(p==='today')return{start:t,end:t};
  if(p==='week'){const d=new Date();d.setDate(d.getDate()-6);return{start:d.toISOString().split('T')[0],end:t};}
  if(p==='month'){const d=new Date(now.getFullYear(),now.getMonth(),1);return{start:d.toISOString().split('T')[0],end:t};}
  if(p==='year')return{start:`${now.getFullYear()}-01-01`,end:t};
  if(p==='custom'&&s&&e)return{start:s,end:e};
  return{start:t,end:t};
}
function monthRange(){
  const now=new Date();
  return{start:`${now.getFullYear()}-${String(now.getMonth()+1).padStart(2,'0')}-01`,end:todayStr()};
}

async function loadData(){
  try{
    const{data,error}=await sb.from('entries').select('*').order('sort_order').order('created_at');
    if(error)throw error;
    S.hugo=(data||[]).filter(r=>r.squad==='hugo').map(fromRow);
    S.calil=(data||[]).filter(r=>r.squad==='calil').map(fromRow);
  }catch(e){console.error('loadData:',e);}

    const{data}=await sb.from('meta_goals').select('*').single();
    if(data){metaGoalId=data.id;S.meta={hugo:data.hugo_goal,calil:data.calil_goal};}
  }catch(e){}
}

}

}

// ONE-TIME MIGRATION from localStorage
async function migrateLocalStorage(){
  const done=localStorage.getItem('poli_supa_migrated');if(done)return;
  const raw=localStorage.getItem('poli_forecast_v3');if(!raw)return;
  const{data}=await sb.from('entries').select('id').limit(1);
  if(data&&data.length>0){localStorage.setItem('poli_supa_migrated','1');return;}
  try{
    const saved=JSON.parse(raw);const t=todayStr();
    const migrate=e=>({status:'active',notes:'',url:'',...e,id:uid(),forecastDate:e.forecastDate||t});
    const hRows=(saved.hugo||[]).map(migrate).map(e=>toRow(e,'hugo'));
    const cRows=(saved.calil||[]).map(migrate).map(e=>toRow(e,'calil'));
    if(hRows.length+cRows.length>0){
      await sb.from('entries').insert([...hRows,...cRows]);
      console.log('Migrated',hRows.length+cRows.length,'entries from localStorage');
    }
    localStorage.setItem('poli_supa_migrated','1');
  }catch(e){console.error('migration:',e);}
}

    if(session){

      currentUser=session.user;
      await migrateLocalStorage();
      await loadData();

function exportCSV(){

}

// ─── CLOSER, RANKING, REPORTS (same as before) ───────────────────────────────
function closerStats(squad,start,end){
  const period=S[squad].filter(e=>e.forecastDate>=start&&e.forecastDate<=end);
  const todayPipe=byDate(S[squad],S.viewDate);
  return CLOSERS[squad].map(c=>{
    const mine=period.filter(e=>e.closer===c),won=mine.filter(e=>e.status==='ganho');
    const pipe=todayPipe.filter(e=>e.closer===c&&e.status!=='perdido');
    return{name:c,short:sN(c),ini:initials(c),wonMRR:sum(won),wonCount:won.length,
      pipeCount:pipe.length,pipeMRR:sum(pipe),total:mine.length,
      lost:mine.filter(e=>e.status==='perdido').length,
      q:mine.filter(e=>e.temp==='Quente').length,m:mine.filter(e=>e.temp==='Morno').length,f:mine.filter(e=>e.temp==='Frio').length};
  });
}
function closerTabHTML(){
  const{start,end}=getPeriodRange(S.period,S.periodStart,S.periodEnd);
  const block=(id,label)=>{
    const stats=closerStats(id,start,end);
    if(S.closerSort==='alpha')stats.sort((a,b)=>a.name.localeCompare(b.name,'pt'));
    else if(S.closerSort==='mrr')stats.sort((a,b)=>b.wonMRR-a.wonMRR||b.pipeMRR-a.pipeMRR);
    else stats.sort((a,b)=>b.pipeCount-a.pipeCount||b.pipeMRR-a.pipeMRR);
    const mx=Math.max(1,...stats.map(s=>s.wonMRR||s.pipeMRR));
    const rows=stats.map(s=>{
      const pct=Math.round((s.wonMRR||s.pipeMRR)/mx*100);
      const pills=[s.q?`<span class="cpill tq">${s.q}Q</span>`:'',s.m?`<span class="cpill tm">${s.m}M</span>`:'',s.f?`<span class="cpill tf">${s.f}F</span>`:'',s.wonCount?`<span class="cpill" style="background:var(--won-d);color:var(--won)">${s.wonCount}G</span>`:''].join('');
      return`<div class="cr"><div><div class="cn">${s.short}</div><div class="cpills">${pills||'<span style="font-size:9px;color:var(--txt3)">sem pipeline</span>'}</div></div><div class="c-bar-w"><div class="c-bar" style="width:${pct}%"></div></div><div class="c-opp">${s.pipeCount}op.</div><div class="c-mrr ${!s.wonMRR&&!s.pipeMRR?'czero':''}">${s.wonMRR>0?fmt(s.wonMRR):s.pipeMRR>0?fmt(s.pipeMRR):'—'}</div></div>`;
    }).join('');

let _chartJsReady=!!window.Chart;
function loadChartJs(){
  if(_chartJsReady)return Promise.resolve();
  return new Promise((res,rej)=>{
    const s=document.createElement('script');
    s.src='https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js';
    s.onload=()=>{_chartJsReady=true;res();};
    s.onerror=rej;
    document.head.appendChild(s);
  });
}
function destroyCharts(){Object.values(chartRefs).forEach(c=>{try{c.destroy();}catch(e){}});chartRefs={};}
async function initCharts(){
  await loadChartJs();
  destroyCharts();
  const{start,end}=getPeriodRange(S.period,S.periodStart,S.periodEnd);
  const all=[...S.hugo.map(e=>({...e,squad:'Hugo'})),...S.calil.map(e=>({...e,squad:'Calil'}))];

  const days=[];const cur=new Date(start+'T12:00:00'),endD=new Date(end+'T12:00:00');
  while(cur<=endD){days.push(cur.toISOString().split('T')[0]);cur.setDate(cur.getDate()+1);}
  const grp={};days.forEach(d=>{grp[d]={mrr:0,won:0};});
  inR.forEach(e=>{if(grp[e.forecastDate]){grp[e.forecastDate].mrr+=Number(e.mrr)||0;if(e.status==='ganho')grp[e.forecastDate].won+=Number(e.mrr)||0;}});
  const isDark=document.documentElement.getAttribute('data-theme')!=='light';

  const c2=document.getElementById('chartTemp');

  const won=inR.filter(e=>e.status==='ganho').length,lost=inR.filter(e=>e.status==='perdido').length,active=inR.filter(e=>e.status==='active').length;
  const c3=document.getElementById('chartStatus');

  const allCl=[...CLOSERS.hugo,...CLOSERS.calil];

window.onDragStart=(squad,ri)=>{dragState={squad,fromIdx:ri};};
window.onDragOver=(e,squad,ri)=>{e.preventDefault();const el=document.getElementById(`ew-${S[squad][ri]?.id}`);if(el)el.classList.add('drag-over');};
window.onDragLeave=el=>{el.classList.remove('drag-over');};
window.onDrop=async(squad,toIdx)=>{
  document.querySelectorAll('.drag-over').forEach(el=>el.classList.remove('drag-over'));
  if(!dragState.squad||dragState.squad!==squad||dragState.fromIdx===toIdx)return;
  const arr=S[squad],[item]=arr.splice(dragState.fromIdx,1);arr.splice(toIdx,0,item);
  dragState={squad:null,fromIdx:null};render();await dbReorder(squad);
};
window.startEdit=(sq,ri)=>{const e=S[sq][ri];S.editingId=e.id;S.editValues={empresa:e.empresa,mrr:e.mrr,temp:e.temp,d:e.d||'',url:e.url||''};render();};
window.saveEdit=async(sq,ri)=>{const e=S[sq][ri],v=S.editValues;e.empresa=v.empresa||e.empresa;e.mrr=v.mrr||e.mrr;e.temp=v.temp;e.d=v.d;e.url=v.url;S.editingId=null;render();await dbUpsert(e,sq);};
window.cancelEdit=()=>{S.editingId=null;render();};
window.togNotes=id=>{S.expandedNotes.has(id)?S.expandedNotes.delete(id):S.expandedNotes.add(id);render();};
window.updateNotes=(sq,ri,v)=>{S[sq][ri].notes=v;};
window.saveNotes=async(sq,ri)=>{const e=S[sq][ri];S.expandedNotes.delete(e.id);render();await dbUpsert(e,sq);};
window.setStatus=async(sq,i,st)=>{const e=S[sq][i];e.status=e.status===st?'active':st;if(e.status==='perdido')S.expandedNotes.add(e.id);render();await dbUpsert(e,sq);};
window.doCarry=async()=>{
  if(!S.carryDate){alert('Selecione a data destino.');return;}
  if(S.carryDate===S.viewDate){alert('A data destino deve ser diferente.');return;}
  const newEntries=[];
  ['hugo','calil'].forEach(sq=>{S[sq].filter(e=>S.selectedIds.has(e.id)).forEach(e=>{const ne={...e,id:uid(),forecastDate:S.carryDate};S[sq].push(ne);newEntries.push({entry:ne,squad:sq});});});
  S.selectedIds=new Set();S.carryDone=true;S.carryDate='';render();
  await Promise.all(newEntries.map(({entry,squad})=>dbUpsert(entry,squad)));
};
window.cancelCarry=()=>{S.selectedIds=new Set();S.carryDone=false;render();};
window.clearCarry=()=>{S.carryDone=false;render();};
window.openMetaEdit=()=>{S.metaEdit=true;S.metaHugoEdit=S.meta.hugo;S.metaCalilEdit=S.meta.calil;render();};
window.confirmMeta=async()=>{S.meta.hugo=Number(S.metaHugoEdit)||0;S.meta.calil=Number(S.metaCalilEdit)||0;S.metaEdit=false;render();await dbSaveMeta();};
window.addEntry=async sq=>{
  const f=S.forms[sq];
  if(!f.e.trim()||!f.mrr){alert('Preencha empresa e MRR.');return;}
  const forecastDate=f.d||S.viewDate;
  const entry={id:uid(),empresa:f.e.trim(),mrr:f.mrr,d:f.d,temp:f.t,closer:f.c||'—',forecastDate,status:'active',notes:'',url:f.url||''};
  S[sq].push(entry);S.forms[sq]={e:'',mrr:'',d:'',t:'Quente',c:'',url:''};
  if(f.d&&f.d!==S.viewDate)S.viewDate=f.d;
  render();await dbUpsert(entry,sq);
};
window.delEntry=async(sq,i)=>{const e=S[sq][i];S[sq].splice(i,1);render();await dbDelete(e.id);};
window.exportCSV=exportCSV;
window.renderReports=renderReports;
window.doSignIn=doSignIn;
window.doSignUp=doSignUp;
window.doSignInGoogle=doSignInGoogle;
window.doSignOut=doSignOut;
</script>
</body>
</html>
